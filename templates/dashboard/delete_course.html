{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h2>Supprimer le cours : {{ course.title }}</h2>
    <p>Êtes-vous sûr de vouloir supprimer ce cours ? Cette action est irréversible.</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" style="background:red;color:white;padding:10px 20px;border:none;border-radius:6px;">Supprimer</button>
        <a href="{% url 'instructor_dashboard' %}">Annuler</a>
    </form>
</div>
{% endblock %}
